name: Auto Pull Request

on:
  push:
    branches:
      - "**"
      - "!main"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create pull request
        id: create-pull-request
        uses: actions/github-script@v6
        with:
          # github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { repo, owner } = context.repo;
            const result = await github.rest.pulls.create({
              title: 'into `main` from `${{ github.ref }}`',
              owner,
              repo,
              head: '${{ github.ref_name }}',
              base: 'develop',
              body: 'Auto generated pull request to `main`'
            });
      #   continue-on-error: true
      # - run: echo "${{ steps.create-pull-request.outcome }} create new pull request"
  terraform:
    uses: hayas1/tfgh/.github/workflows/terraform.yml@modify/tfgh-terraform-workflow-script
    needs: create-pr
